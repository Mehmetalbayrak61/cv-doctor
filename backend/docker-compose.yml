services:
  postgres:
    image: postgres:16-alpine
    container_name: cv-doktor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cvdoktor
      POSTGRES_PASSWORD: cvdoktor
      POSTGRES_DB: cvdoktor
    ports:
      - "5433:5432"
    volumes:
      - cv_doktor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvdoktor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cv_doktor_pg_data:
