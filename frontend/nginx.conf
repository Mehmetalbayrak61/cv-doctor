server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Hashed asset dosyaları (Vite çıktısı) süresiz cache'lenebilir.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: react-router'ın client-side route'ları için tüm bilinmeyen
    # yolları index.html'e düşür (ör. doğrudan /dashboard'a girilmesi).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
